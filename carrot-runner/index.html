function saveProgress() {
  // Leaderboard
  const leaderboard = Storage.get('leaderboard', []);
  const existing = leaderboard.find(e => e.name === playerName);
  if (existing) {
    if (score > existing.score) existing.score = score;
    existing.streak = Math.max(existing.streak || 0, streak);
  } else if (playerName) {
    leaderboard.push({ name: playerName, score, streak: streak });
  }
  leaderboard.sort((a, b) => b.score - a.score);
  Storage.set('leaderboard', leaderboard.slice(0, 10));

  // Stats
  Storage.set('stats', MathEngine.stats);
}

// ===================== GAME LOOP =====================
function gameLoop() {
  if (!gameRunning) return;
  requestAnimationFrame(gameLoop);

  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.getElapsedTime();

  animateRabbit(dt, time);
  updateEnvironment(dt, time);

  renderer.render(scene, camera);
}

// Garden
function drawGarden() {
  const canvas = document.getElementById('gardenCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = 600;

  const totalCarrots = Storage.get('totalCarrots', 0);
  const rows = Math.floor(totalCarrots / 10);

  // Soil background
  ctx.fillStyle = '#5c3317';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Dirt texture
  for (let i = 0; i < 200; i++) {
    ctx.fillStyle = `rgba(${60+Math.random()*40}, ${30+Math.random()*20}, ${10+Math.random()*15}, 0.5)`;
    ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 3+Math.random()*5, 2+Math.random()*3);
  }

  // Draw carrot rows
  const rowHeight = 50;
  const startY = 40;
  for (let r = 0; r < Math.min(rows, 10); r++) {
    const y = startY + r * rowHeight;
    const carrotsInRow = r < rows - 1 ? 10 : (totalCarrots % 10 || 10);
    for (let c = 0; c < carrotsInRow; c++) {
      const x = 40 + c * (canvas.width - 80) / 10;
      // Green top
      ctx.fillStyle = '#228b22';
      ctx.beginPath();
      ctx.moveTo(x, y); ctx.lineTo(x-6, y-20); ctx.lineTo(x+6, y-20); ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x-3, y); ctx.lineTo(x-10, y-18); ctx.lineTo(x, y-15); ctx.closePath();
      ctx.fill();
      // Orange carrot body
      ctx.fillStyle = '#ff8c00';
      ctx.beginPath();
      ctx.moveTo(x-8, y); ctx.lineTo(x+8, y); ctx.lineTo(x, y+30); ctx.closePath();
      ctx.fill();
      // Lines on carrot
      ctx.strokeStyle = '#cc7000';
      ctx.lineWidth = 1;
      for (let l = 0; l < 3; l++) {
        ctx.beginPath();
        const ly = y + 5 + l * 8;
        ctx.moveTo(x-5+l, ly); ctx.lineTo(x+5-l, ly);
        ctx.stroke();
      }
    }
  }

  // Golden carrot statue at 100
  if (totalCarrots >= 100) {
    const cx = canvas.width / 2;
    const cy = canvas.height - 100;
    ctx.fillStyle = '#FFD700';
    ctx.shadowColor = '#FFD700';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.moveTo(cx-20, cy); ctx.lineTo(cx+20, cy); ctx.lineTo(cx, cy+60); ctx.closePath();
    ctx.fill();
    // Crown
    ctx.beginPath();
    ctx.moveTo(cx-15, cy-5); ctx.lineTo(cx-25, cy-25); ctx.lineTo(cx-10, cy-15);
    ctx.lineTo(cx, cy-30); ctx.lineTo(cx+10, cy-15); ctx.lineTo(cx+25, cy-25);
    ctx.lineTo(cx+15, cy-5); ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('GOLDEN CARROT', cx, cy + 80);
  }

  document.getElementById('gardenInfo').textContent = `Total carrots collected: ${totalCarrots} | Rows planted: ${rows}`;
}

// Skins
function drawSkins() {
  const grid = document.getElementById('skinGrid');
  grid.innerHTML = '';
  const totalCorrect = getTotalCorrect();
  const selected = getSelectedSkin();

  SKINS.forEach(skin => {
    const card = document.createElement('div');
    card.className = 'skin-card' + (skin.id === selected ? ' selected' : '') + (totalCorrect < skin.req ? ' locked' : '');
    const swatch = document.createElement('div');
    swatch.className = 'skin-swatch';
    swatch.style.background = '#' + skin.color.toString(16).padStart(6, '0');
    if (skin.id === 'galaxy') {
      swatch.style.background = 'linear-gradient(135deg, #4400aa, #0044aa, #aa0044, #4400aa)';
    }
    card.appendChild(swatch);
    const name = document.createElement('div');
    name.className = 'skin-name';
    name.textContent = skin.name;
    card.appendChild(name);
    const req = document.createElement('div');
    req.className = 'skin-req';
    req.textContent = totalCorrect >= skin.req ? 'Unlocked' : `Need ${skin.req} correct`;
    card.appendChild(req);

    if (totalCorrect >= skin.req) {
      card.onclick = () => {
        Storage.set('selectedSkin', skin.id);
        drawSkins();
      };
    }
    grid.appendChild(card);
  });
}

// Stats
function drawStats() {
  const el = document.getElementById('statsContent');
  const stats = Storage.get('stats', MathEngine.stats);
  const totalCorrect = getTotalCorrect();

  const opNames = {add: 'Addition (+)', sub: 'Subtraction (−)', mul: 'Multiplication (×)', div: 'Division (÷)'};
  const opColors = {add: '#4caf50', sub: '#2196f3', mul: '#ff9800', div: '#9c27b0'};

  let html = `<p style="text-align:center;font-weight:bold;color:#333">Total Problems Solved: ${totalCorrect}</p>`;

  // Best and weakest
  let bestOp = '', worstOp = '', bestAcc = 0, worstAcc = 100;

  Object.keys(opNames).forEach(op => {
    const s = stats[op] || {correct: 0, total: 0, totalTime: 0};
    const acc = s.total > 0 ? Math.round(s.correct / s.total * 100) : 0;
    const avgTime = s.total > 0 ? (s.totalTime / s.total).toFixed(1) : '-';

    if (s.total > 0) {
      if (acc > bestAcc) { bestAcc = acc; bestOp = opNames[op]; }
      if (acc < worstAcc) { worstAcc = acc; worstOp = opNames[op]; }
    }

    html += `<div class="stat-bar-container">
      <div class="stat-bar-label">${opNames[op]} - ${s.total} problems, avg ${avgTime}s</div>
      <div class="stat-bar-bg">
        <div class="stat-bar-fill" style="width:${acc}%;background:${opColors[op]}">${acc}%</div>
      </div>
    </div>`;
  });

  if (bestOp) html += `<p style="color:#4caf50;text-align:center;margin-top:0.5rem"><strong>Strongest:</strong> ${bestOp} (${bestAcc}%)</p>`;
  if (worstOp && worstOp !== bestOp) html += `<p style="color:#f44336;text-align:center"><strong>Needs practice:</strong> ${worstOp} (${worstAcc}%)</p>`;

  el.innerHTML = html;
}

// Daily Challenge
function drawDaily() {
  const el = document.getElementById('dailyContent');
  const key = getDailyKey();
  const completed = Storage.get('dailyCompleted', {});
  const todayDone = completed[key] || false;

  el.innerHTML = todayDone
    ? `<p style="text-align:center;color:#4caf50;font-weight:bold;font-size:1.2rem">⭐ Today's challenge complete! ⭐</p>`
    : `<p style="text-align:center">Complete 20 questions to earn today's star!</p>
       <button onclick="startDailyChallenge()" style="display:block;margin:1rem auto;padding:0.8rem 2rem;background:#e8760a;color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:bold;cursor:pointer">Start Daily Challenge</button>`;

  // Calendar
  const calEl = document.getElementById('calendarArea');
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();

  let calHtml = `<h3 style="text-align:center;color:#333;margin-bottom:0.5rem">${now.toLocaleDateString('en-US', {month:'long', year:'numeric'})}</h3>`;
  calHtml += '<div class="calendar-grid">';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => calHtml += `<div class="cal-header">${d}</div>`);
  for (let i = 0; i < firstDay; i++) calHtml += '<div></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isDone = completed[dateKey];
    const isToday = d === now.getDate();
    calHtml += `<div class="cal-day${isDone ? ' completed' : ''}${isToday ? ' today' : ''}">${isDone ? '⭐' : d}</div>`;
  }
  calHtml += '</div>';
  calEl.innerHTML = calHtml;
}

function returnToMenu() {
  gameRunning = false;
  stopAmbient();
  document.getElementById('startScreen').style.display = '';
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('questionArea').classList.add('hidden');
  document.getElementById('menuBtn').style.display = 'none';
  document.getElementById('victoryScreen').classList.remove('show');
  isDailyChallenge = false;
  showLeaderboard();
  showHighScore();
}

function actuallyStartGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('questionArea').classList.remove('hidden');
  document.getElementById('menuBtn').style.display = '';

  score = 0;
  streak = 0;
  runDistance = 0;
  currentEnvIndex = 0;
  envTransition = 0;
  totalCorrectThisGame = 0;
  gameRunning = true;
  pendingSimilar = null;

  MathEngine.reset();

  if (!scene) initThree();

  // Rebuild rabbit with current skin
  if (rabbitGroup) { scene.remove(rabbitGroup); }
  rabbitParts = {};
  streakItems = {};
  buildRabbit();

  // Clean up old particles & trails
  particles.forEach(p => scene.remove(p)); particles = [];
  trailParticles.forEach(p => scene.remove(p)); trailParticles = [];
  envParticles.forEach(p => scene.remove(p)); envParticles = [];
  if (foxCompanion) { scene.remove(foxCompanion); foxCompanion = null; }

  scene.background = new THREE.Color(ENVS[0].sky);
  startAmbient(0);

  updateHUD();
  clock.start();

  if (isDailyChallenge) {
    nextDailyQuestion();
  } else {
    nextQuestion();
  }
  gameLoop();
}

function nextDailyQuestion() {
  if (dailyIndex >= dailyQuestions.length) {
    // Completed daily
    const completed = Storage.get('dailyCompleted', {});
    completed[getDailyKey()] = true;
    Storage.set('dailyCompleted', completed);
    // Show congrats
    const feedback = document.getElementById('feedback');
    feedback.textContent = '⭐ Daily Challenge Complete! ⭐';
    feedback.className = 'feedback-correct';
    AudioEngine.victory();
    setTimeout(() => returnToMenu(), 3000);
    return;
  }
  currentQuestion = dailyQuestions[dailyIndex];
  currentQuestion.isBoss = false;
  currentQuestion.isSpeedZone = false;
  MathEngine.questionStartTime = Date.now();

  document.getElementById('questionText').textContent = `[${dailyIndex+1}/20] ${currentQuestion.text} = ?`;
  document.getElementById('hintText').textContent = '💡 ' + currentQuestion.hint;
  document.getElementById('feedback').textContent = '';
  document.getElementById('answerInput').value = '';
  document.getElementById('answerInput').focus();

  carrotTargetZ = rabbitGroup.position.z - 30;
  carrotMesh.position.z = carrotTargetZ;
  carrotMesh.visible = true;
}

  playerName = document.getElementById('playerNameInput').value.trim() || 'Player';
  Storage.set('lastPlayer', playerName);
  isDailyChallenge = false;
  actuallyStartGame();
}

  const val = parseInt(input.value);
  if (isNaN(val)) { AudioEngine.emptySubmit(); shakeQuestion(); return; }

  const feedback = document.getElementById('feedback');
  if (val === currentQuestion.answer) {
    score++;
    streak++;
    dailyIndex++;
    rabbitState = 'jumping';
    stateTimer = 0.8;
    AudioEngine.correct();
    spawnParticles(carrotMesh.position.clone(), 0xff8c00, 20);
    carrotMesh.visible = false;
    feedback.textContent = 'Correct! ✨';
    feedback.className = 'feedback-correct';
    updateHUD();
    setTimeout(() => nextDailyQuestion(), 1000);
  } else {
    streak = 0;
    rabbitState = 'stumbling';
    stateTimer = 0.8;
    AudioEngine.wrong();
    feedback.textContent = `The answer was ${currentQuestion.answer}`;
    feedback.className = 'feedback-wrong';
    dailyIndex++;
    updateHUD();
    input.value = '';
    setTimeout(() => nextDailyQuestion(), 2000);
  }
}

document.addEventListener('keydown', (e) => {
  if (gameRunning && e.key === ' ') e.preventDefault();
});

function showHighScore() {
  const lb = Storage.get('leaderboard', []);
  const best = lb.length > 0 ? lb[0].score : 0;
  if (best > 0) {
    document.getElementById('highScoreText').textContent = `🏆 Best: ${best} carrots`;
  }
}

// Init
document.getElementById('playerNameInput').value = Storage.get('lastPlayer', '');
showLeaderboard();
showHighScore();
</script>
</body>
</html>
