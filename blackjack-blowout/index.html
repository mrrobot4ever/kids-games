<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Blackjack Blowout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="ambient-bg"></div>
    <main class="game-layout">
      <header class="hud-bar glass-panel">
        <div class="hud-chip brand-chip">BLACKJACK BLOWOUT</div>
        <div class="hud-chip"><span>Bankroll</span><strong id="bankrollValue">$50,000</strong></div>
        <div class="hud-chip compact"><span>Shoe</span><strong id="shoeCountMobile">104</strong></div>
        <button class="hud-chip sound-chip" id="soundToggle" aria-label="Toggle sound">Sound On</button>
      </header>

      <section class="table-frame">
        <div class="table-surface" id="tableSurface">
          <img class="table-hero" src="./assets/generated/02-table-hero-bg.png" alt="Luxury blackjack table" />
          <div class="table-overlay"></div>

          <div class="table-grid">
            <section class="dealer-zone zone">
              <div class="zone-topline">
                <div class="zone-label-wrap">
                  <span class="label">Dealer</span>
                  <strong id="dealerTotal">--</strong>
                </div>
                <div class="shoe-stack" id="shoeStack" title="Shoe"></div>
              </div>
              <div class="hand-row" id="dealerHand"></div>
            </section>

            <section class="center-zone">
              <div class="status-banner glass-panel" id="statusBanner">Place your bet to begin.</div>
              <div class="bet-circle" id="betCircle">
                <span>Bet</span>
                <strong id="currentBetValue">$0</strong>
                <small id="roundPhaseLabel">Betting</small>
              </div>
            </section>

            <section class="player-zone zone">
              <div class="zone-topline">
                <div class="zone-label-wrap">
                  <span class="label">Player</span>
                  <strong id="playerSummary">0 hands</strong>
                </div>
                <div class="mini-campaign" id="campaignState">Target $1M</div>
              </div>
              <div class="hands-grid" id="playerHands"></div>
            </section>
          </div>
        </div>
      </section>

      <footer class="control-dock glass-panel">
        <div class="controls-meta" id="tableMessage">Luxury rules. Clean play. Big swings.</div>
        <div class="chip-row" id="chipRow">
          <button class="chip-btn chip-1000" data-chip="1000">$1K</button>
          <button class="chip-btn chip-2500" data-chip="2500">$2.5K</button>
          <button class="chip-btn chip-5000" data-chip="5000">$5K</button>
          <button class="ghost-btn" id="clearBetBtn">Clear</button>
          <button class="ghost-btn" id="rebetBtn">Rebet</button>
          <button class="primary-btn" id="dealBtn">Deal</button>
        </div>
        <div class="action-row">
          <button class="action-btn" id="hitBtn">Hit</button>
          <button class="action-btn" id="standBtn">Stand</button>
          <button class="action-btn" id="doubleBtn">Double</button>
          <button class="action-btn" id="splitBtn">Split</button>
        </div>
      </footer>
    </main>
  </div>

  <script src="./script.js"></script>
</body>
</html>
