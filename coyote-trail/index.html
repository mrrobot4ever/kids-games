<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Coyote Trail - Spelling Adventure</title>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:hidden;background:#1a0a00;font-family:'Georgia',serif;touch-action:none;height:100%;width:100%;position:fixed;top:0;left:0}
#game-container{position:relative;width:100%;height:100%}
canvas{display:block;width:100%!important;height:100%!important;position:absolute;top:0;left:0}
#ui-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;-webkit-transform:translateZ(0);transform:translateZ(0)}
#ui-overlay>*{pointer-events:auto}
#hud{position:absolute;top:10px;left:10px;right:10px;display:none;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:20}
.hud-item{background:rgba(0,0,0,.5);color:#fff;padding:5px 14px;border-radius:20px;font-size:15px;font-weight:bold;text-shadow:1px 1px 2px #000;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
#word-display{position:absolute;top:18%;left:50%;-webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%);font-size:36px;font-size:clamp(28px,6vw,56px);font-weight:bold;color:#fff;text-shadow:3px 3px 6px rgba(0,0,0,.9),0 0 20px rgba(255,215,0,.5);letter-spacing:6px;display:none;z-index:15;text-align:center}
#word-picture{position:absolute;top:22%;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);font-size:64px;font-size:clamp(48px,12vw,80px);display:none;z-index:15;text-align:center;text-shadow:0 4px 8px rgba(0,0,0,.5);line-height:1;cursor:pointer;-webkit-animation:picturePulse 3s ease-in-out infinite;animation:picturePulse 3s ease-in-out infinite}
#word-picture:active{-webkit-transform:translateX(-50%) scale(0.9);transform:translateX(-50%) scale(0.9)}
@-webkit-keyframes picturePulse{0%,100%{-webkit-transform:translateX(-50%) scale(1);transform:translateX(-50%) scale(1)}50%{-webkit-transform:translateX(-50%) scale(1.08);transform:translateX(-50%) scale(1.08)}}
@keyframes picturePulse{0%,100%{-webkit-transform:translateX(-50%) scale(1);transform:translateX(-50%) scale(1)}50%{-webkit-transform:translateX(-50%) scale(1.08);transform:translateX(-50%) scale(1.08)}}
#answer-row{position:absolute;top:40%;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);display:-webkit-flex;display:flex;min-height:50px;z-index:15;-webkit-justify-content:center;justify-content:center;-webkit-align-items:center;align-items:center;-webkit-flex-wrap:wrap;flex-wrap:wrap;max-width:92vw}
.answer-slot{margin:2px;width:40px;width:clamp(32px,6vw,48px);height:44px;height:clamp(36px,6.5vw,52px);border:2px dashed rgba(255,255,255,.4);border-radius:8px;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;font-size:22px;font-size:clamp(18px,4vw,28px);font-weight:bold;color:#fff;text-shadow:1px 1px 3px #000;background:rgba(0,0,0,.2)}
.answer-slot.filled{border-color:#FFD700;background:rgba(255,215,0,.15);border-style:solid}
.answer-slot.correct{border-color:#4CAF50;background:rgba(76,175,80,.3);border-style:solid}
.answer-slot.wrong{border-color:#f44336;background:rgba(244,67,54,.2);border-style:solid}
#tile-area{position:absolute;bottom:70px;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;-webkit-justify-content:center;justify-content:center;max-width:92%;z-index:15}
.letter-tile{margin:3px;min-width:42px;min-width:clamp(36px,7vw,50px);height:46px;height:clamp(40px,7.5vw,54px);border:none;border-radius:10px;font-size:20px;font-size:clamp(16px,4vw,26px);font-weight:bold;cursor:pointer;background:-webkit-linear-gradient(top,#F5DEB3,#DEB887 60%,#C8A060);background:linear-gradient(180deg,#F5DEB3,#DEB887 60%,#C8A060);color:#3A1800;box-shadow:0 3px 0 #7A5900,0 5px 8px rgba(0,0,0,.3);display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;-webkit-user-select:none;user-select:none;padding:0 5px}
.letter-tile:active{transform:translateY(2px);box-shadow:0 1px 0 #7A5900}
.letter-tile.used{opacity:.2;pointer-events:none;transform:scale(.85)}
#typing-input{position:absolute;bottom:16px;left:50%;-webkit-transform:translateX(-50%);transform:translateX(-50%);width:78vw;max-width:260px;height:40px;font-size:18px;text-align:center;border:2px solid rgba(255,255,255,.25);border-radius:20px;background:rgba(0,0,0,.4);color:#fff;outline:none;font-family:'Georgia',serif;letter-spacing:3px;z-index:15}
#typing-input:focus{border-color:rgba(255,215,0,.5)}

#feedback{position:absolute;top:42%;left:50%;-webkit-transform:translate(-50%,-50%);transform:translate(-50%,-50%);font-size:22px;font-size:clamp(18px,4vw,28px);font-weight:bold;color:#fff;text-shadow:2px 2px 4px #000;z-index:16;display:none;text-align:center}
#start-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:-webkit-linear-gradient(top,#87CEEB 0%,#E8985E 50%,#C2703C 100%);background:linear-gradient(180deg,#87CEEB 0%,#E8985E 50%,#C2703C 100%);display:-webkit-flex;display:flex;-webkit-flex-direction:column;flex-direction:column;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;z-index:50;color:#fff;text-shadow:2px 2px 4px rgba(0,0,0,.5)}
#start-screen h1{font-size:48px;font-size:clamp(36px,8vw,72px);margin-bottom:8px;color:#FFD700}
#start-screen p{font-size:16px;font-size:clamp(14px,3vw,20px);margin-bottom:24px;opacity:.9}
#start-screen input{width:70vw;max-width:240px;height:40px;font-size:18px;text-align:center;border:2px solid rgba(255,255,255,.4);border-radius:20px;background:rgba(0,0,0,.3);color:#fff;outline:none;margin-bottom:14px;font-family:'Georgia',serif}
#start-screen select{width:70vw;max-width:240px;height:40px;font-size:16px;text-align:center;border:2px solid rgba(255,255,255,.4);border-radius:20px;background:rgba(0,0,0,.3);color:#fff;outline:none;margin-bottom:18px;font-family:'Georgia',serif}
#start-screen select option{background:#333;color:#fff}
#start-btn{width:60vw;max-width:200px;height:48px;font-size:20px;font-weight:bold;border:none;border-radius:24px;background:linear-gradient(180deg,#FFD700,#FFA500);color:#3A1800;cursor:pointer;box-shadow:0 4px 0 #996600,0 6px 10px rgba(0,0,0,.3);font-family:'Georgia',serif}
#start-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #996600}
@-webkit-keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* iPad layout adjustments */
@media (min-width:768px) and (max-height:1100px) {
  #word-picture{top:18%;font-size:72px;font-size:clamp(56px,8vw,80px)}
  #answer-row{top:35%}
  #tile-area{bottom:90px}
  #typing-input{bottom:30px}
  .answer-slot{width:48px;width:clamp(40px,5vw,56px);height:52px;height:clamp(44px,5.5vw,60px);font-size:26px;font-size:clamp(22px,3.5vw,32px)}
  .letter-tile{min-width:50px;min-width:clamp(44px,5vw,58px);height:54px;height:clamp(48px,5.5vw,62px);font-size:24px;font-size:clamp(20px,3vw,28px)}
}
/* Landscape phones/tablets */
@media (max-height:500px) {
  #word-picture{top:5%;font-size:40px}
  #word-display{top:8%}
  #answer-row{top:30%}
  #tile-area{bottom:50px}
  #typing-input{bottom:8px;height:34px;font-size:16px}
  #feedback{top:35%}
  .hud-item{font-size:12px;padding:3px 10px}
}
</style>
</head>
<body>
<div id="game-container">
<div id="ui-overlay">
<div id="hud">
<div class="hud-item" id="hud-score">Score: 0</div>
<div class="hud-item" id="hud-streak">Streak: 0</div>
<div class="hud-item" id="hud-companions">Party: 1</div>
</div>
<div id="word-display"></div>
<div id="word-picture"></div>
<div id="answer-row"></div>

<div id="feedback"></div>
<div id="tile-area"></div>
<input type="text" id="typing-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="type here...">
</div>
<div id="start-screen">
<h1>Coyote Trail</h1>
<p>A Spelling Adventure</p>
<input type="text" id="player-name" placeholder="Your name..." maxlength="20">
<select id="grade-select">
<option value="1">Grade 1</option>
<option value="2">Grade 2</option>
<option value="3">Grade 3</option>
</select>
<button id="start-btn">Hit the Trail!</button>
</div>
</div>

<script>
// ========== WORD LISTS ==========
const WORD_PICTURES = {
// Grade 1
cat:'🐱',dog:'🐶',sun:'☀️',hat:'🎩',red:'🔴',big:'🐘',run:'🏃',fun:'🎉',sit:'🪑',map:'🗺️',
bed:'🛏️',cup:'☕',top:'🔝',hot:'🔥',box:'📦',pen:'🖊️',six:'6️⃣',bus:'🚌',leg:'🦵',net:'🥅',
fish:'🐟',tree:'🌳',bird:'🐦',frog:'🐸',cake:'🎂',bike:'🚲',home:'🏠',rain:'🌧️',boat:'⛵',star:'⭐',
moon:'🌙',play:'🎮',book:'📖',hand:'✋',jump:'🦘',swim:'🏊',sing:'🎤',ring:'💍',bell:'🔔',duck:'🦆',
// Grade 2
about:'💬',again:'🔄',every:'📋',laugh:'😂',learn:'📚',light:'💡',might:'💪',never:'🚫',night:'🌃',paper:'📄',
place:'📍',plant:'🌱',right:'➡️',small:'🐜',sound:'🔊',south:'🧭',spell:'✨',story:'📖',table:'🪑',their:'👥',
think:'🤔',three:'3️⃣',today:'📅',under:'⬇️',water:'💧',where:'❓',which:'🔀',while:'⏳',women:'👩',world:'🌍',
write:'✍️',young:'👶',after:'⏩',along:'🛤️',begin:'🟢',carry:'🎒',clean:'🧹',close:'🚪',could:'💭',dance:'💃',
// Grade 3
answer:'💡',bought:'🛒',brought:'📦',caught:'🥅',change:'🔄',course:'🏫',early:'🌅',earth:'🌎',enough:'✅',family:'👨‍👩‍👧‍👦',
friend:'🤝',group:'👥',heard:'👂',island:'🏝️',known:'🧠',large:'🐋',listen:'👂',often:'🔁',people:'👫',picture:'🖼️',
please:'🙏',question:'❓',ready:'👍',really:'‼️',river:'🏞️',school:'🏫',should:'📋',special:'🌟',thought:'💭',through:'🚇',
together:'🤝',trouble:'⚠️',until:'⏰',usual:'📎',village:'🏘️',weather:'🌤️',whose:'🔍',wonder:'🤩',already:'✅'
};
const WORDS = {
1: ['cat','dog','sun','hat','red','big','run','fun','sit','map','bed','cup','top','hot','box','pen','six','bus','leg','net','fish','tree','bird','frog','cake','bike','home','rain','boat','star','moon','play','book','hand','jump','swim','sing','ring','bell','duck'],
2: ['about','again','every','laugh','learn','light','might','never','night','paper','place','plant','right','small','sound','south','spell','story','table','their','think','three','today','under','water','where','which','while','women','world','write','young','after','along','begin','carry','clean','close','could','dance'],
3: ['answer','bought','brought','caught','change','course','early','earth','enough','family','friend','group','heard','island','known','large','learn','listen','often','people','picture','please','question','ready','really','river','school','should','special','thought','through','together','trouble','until','usual','village','weather','whose','wonder','already']
};

// ========== THEMES ==========
const THEMES = [
{name:'Desert Day', sky1:0x87CEEB, sky2:0xE8985E, ground:0xD2A86B, mt:0xB8860B},
{name:'Mesa Sunset', sky1:0xFF6B35, sky2:0x8B1A1A, ground:0xA0522D, mt:0x800020},
{name:'Canyon Night', sky1:0x0D1B2A, sky2:0x1B2838, ground:0x3E2723, mt:0x1A1A2E},
{name:'Oasis', sky1:0x4FC3F7, sky2:0x81C784, ground:0x8BC34A, mt:0x2E7D32},
{name:'Ancient Ruins', sky1:0xBCAAA4, sky2:0x795548, ground:0x8D6E63, mt:0x5D4037}
];

const ENCOUNTER_TYPES = ['gate','bridge','campfire','sand'];
const COMPANION_NAMES = ['Roadrunner','Jackrabbit','Armadillo','Tortoise','Hawk','Fox','Owl','Rattlesnake','Scorpion','Eagle'];

// ========== GLOBALS ==========
let app, gameState, coyote, parallax, encounterObj;
let score = 0, streak = 0, totalCorrect = 0, companionCount = 0;
let currentWord = '', currentEncounter = '';
let playerName = '', grade = 1;
let walking = false, inEncounter = false, correctLock = false;
let encounterGen = 0; // generation counter to scope fallback timers
let wrongFallbackTimer = null;
let wrongRevealInterval = null;
let correctFallbackTimer = null;
let mastery = {}; // word -> {correct:0, wrong:0, level:0}
let companionsEarned = [];
let companionSprites = [];
let animTime = 0;
let coyoteX = 200, coyoteScreenX = 200;
let worldOffset = 0;
let inputLetters = [];
let encounterContainer;

// ========== AUDIO ==========
let audioCtx;
function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function playTone(freq, dur, type='sine', vol=0.15) {
    try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + dur);
    } catch(e) {}
}

function playHowl() {
    [300,400,500,600,700].forEach((f,i) => setTimeout(() => playTone(f, 0.4, 'sine', 0.12), i*100));
}

function playCorrect() {
    [523,659,784].forEach((f,i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.1), i*80));
}

function playWrong() {
    playTone(180, 0.4, 'triangle', 0.1);
}

function playFootstep() {
    playTone(80 + Math.random()*30, 0.05, 'triangle', 0.04);
}

function playTileClick() {
    playTone(800, 0.05, 'square', 0.06);
}

function playFanfare() {
    [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.3, 'sine', 0.1), i*120));
}

// ========== SPEECH ==========
function speakWord(word) {
    try {
        const u = new SpeechSynthesisUtterance(word);
        u.rate = 0.85;
        u.pitch = 1;
        speechSynthesis.cancel();
        speechSynthesis.speak(u);
    } catch(e) {}
}

// ========== PERSISTENCE ==========
function saveData() {
    try {
        localStorage.setItem('coyoteTrail', JSON.stringify({
            score, totalCorrect, companionCount, companionsEarned,
            mastery, playerName, grade
        }));
    } catch(e) {}
}

function loadData() {
    try {
        const d = JSON.parse(localStorage.getItem('coyoteTrail'));
        if (d) {
            score = d.score || 0;
            totalCorrect = d.totalCorrect || 0;
            companionCount = d.companionCount || 0;
            companionsEarned = d.companionsEarned || [];
            mastery = d.mastery || {};
            if (d.playerName) document.getElementById('player-name').value = d.playerName;
            if (d.grade) document.getElementById('grade-select').value = d.grade;
        }
    } catch(e) {}
}

// ========== PIXI SETUP ==========
function getViewHeight() {
    return document.documentElement.clientHeight || window.innerHeight;
}
function getViewWidth() {
    return document.documentElement.clientWidth || window.innerWidth;
}
function initPixi() {
    app = new PIXI.Application({
        width: getViewWidth(),
        height: getViewHeight(),
        backgroundColor: 0x87CEEB,
        antialias: true,
        resolution: Math.min(window.devicePixelRatio || 1, 2),
        autoDensity: true
    });
    var cv = app.view;
    cv.style.width = '100%';
    cv.style.height = '100%';
    document.getElementById('game-container').insertBefore(cv, document.getElementById('ui-overlay'));

    parallax = { bg: new PIXI.Container(), mid: new PIXI.Container(), fg: new PIXI.Container() };
    app.stage.addChild(parallax.bg);
    app.stage.addChild(parallax.mid);
    encounterContainer = new PIXI.Container();
    app.stage.addChild(encounterContainer);
    app.stage.addChild(parallax.fg);

    buildEnvironment();
    coyote = createCoyote();
    coyote.x = coyoteScreenX;
    coyote.y = groundY() - 5;
    app.stage.addChild(coyote);

    app.ticker.add(gameLoop);

    window.addEventListener('resize', () => {
        app.renderer.resize(getViewWidth(), getViewHeight());
        buildEnvironment();
        coyote.y = groundY() - 5;
    });
    window.addEventListener('orientationchange', () => {
        setTimeout(() => {
            app.renderer.resize(getViewWidth(), getViewHeight());
            buildEnvironment();
            coyote.y = groundY() - 5;
        }, 200);
    });
}

function groundY() { return app.renderer.height * 0.78; }
function W() { return app.renderer.width; }
function H() { return app.renderer.height; }

// ========== ENVIRONMENT ==========
function getTheme() { return THEMES[Math.floor(totalCorrect / 10) % THEMES.length]; }

function buildEnvironment() {
    const theme = getTheme();
    parallax.bg.removeChildren();
    parallax.mid.removeChildren();
    parallax.fg.removeChildren();

    // Sky gradient
    const sky = new PIXI.Graphics();
    sky.beginFill(theme.sky1);
    sky.drawRect(0, 0, W(), H() * 0.5);
    sky.endFill();
    sky.beginFill(theme.sky2);
    sky.drawRect(0, H() * 0.5, W(), H() * 0.5);
    sky.endFill();
    parallax.bg.addChild(sky);

    // Mountains
    for (let i = 0; i < 8; i++) {
        const mt = new PIXI.Graphics();
        const mx = i * W() * 0.2 - 50;
        const mh = 80 + Math.random() * 120;
        mt.beginFill(theme.mt, 0.6);
        mt.moveTo(mx, groundY() - 30);
        mt.lineTo(mx + 60 + Math.random()*60, groundY() - 30 - mh);
        mt.lineTo(mx + 140 + Math.random()*60, groundY() - 30);
        mt.closePath();
        mt.endFill();
        mt._baseX = mx;
        parallax.bg.addChild(mt);
    }

    // Ground
    const ground = new PIXI.Graphics();
    ground.beginFill(theme.ground);
    ground.drawRect(0, groundY() - 10, W(), H() - groundY() + 10);
    ground.endFill();
    // Path
    ground.beginFill(0xC8A060);
    ground.drawRect(0, groundY() - 5, W(), 30);
    ground.endFill();
    parallax.fg.addChild(ground);

    // Cacti (midground decorations)
    for (let i = 0; i < 12; i++) {
        const c = drawCactus();
        c.x = i * W() * 0.15 + Math.random()*80;
        c.y = groundY() - 15;
        c._baseX = c.x;
        c.scale.set(0.5 + Math.random()*0.4);
        parallax.mid.addChild(c);
    }
}

function drawCactus() {
    const g = new PIXI.Graphics();
    g.beginFill(0x2E7D32);
    g.drawRoundedRect(-6, -50, 12, 50, 4);
    // Arms
    g.drawRoundedRect(-22, -38, 16, 8, 3);
    g.drawRoundedRect(-22, -38, 8, 20, 3);
    g.drawRoundedRect(6, -28, 16, 8, 3);
    g.drawRoundedRect(14, -28, 8, 16, 3);
    g.endFill();
    return g;
}

// ========== COYOTE ==========
function createCoyote() {
    const c = new PIXI.Container();
    c._legPhase = 0;
    c._bobPhase = 0;
    c._tailPhase = 0;
    c._blinkTimer = 0;
    c._blinking = false;
    c._howling = false;
    c._howlTimer = 0;

    // Build parts
    c._body = new PIXI.Graphics();
    c._head = new PIXI.Graphics();
    c._tail = new PIXI.Graphics();
    c._legs = [new PIXI.Graphics(), new PIXI.Graphics(), new PIXI.Graphics(), new PIXI.Graphics()];
    c._eyeL = new PIXI.Graphics();
    c._eyeR = new PIXI.Graphics();

    // Add in order: tail, legs, body, head, eyes
    c.addChild(c._tail);
    c._legs.forEach(l => c.addChild(l));
    c.addChild(c._body);
    c.addChild(c._head);
    c.addChild(c._eyeL);
    c.addChild(c._eyeR);

    drawCoyoteParts(c);
    return c;
}

function drawCoyoteParts(c) {
    const s = 1;
    // Body
    const body = c._body;
    body.clear();
    body.beginFill(0xC4A46E);
    body.drawEllipse(0, 0, 40*s, 18*s);
    body.endFill();
    body.beginFill(0xDEC9A0);
    body.drawEllipse(2, 5, 30*s, 10*s);
    body.endFill();

    // Head
    const head = c._head;
    head.clear();
    head.beginFill(0xC4A46E);
    head.drawCircle(0, 0, 15*s);
    head.endFill();
    // Snout
    head.beginFill(0xBB9960);
    head.moveTo(12, -3);
    head.lineTo(26, 2);
    head.lineTo(12, 6);
    head.closePath();
    head.endFill();
    // Nose
    head.beginFill(0x222222);
    head.drawCircle(25, 2, 3);
    head.endFill();
    // Ears
    head.beginFill(0xA88B55);
    head.moveTo(-4, -14);
    head.lineTo(-10, -30);
    head.lineTo(4, -16);
    head.closePath();
    head.endFill();
    head.beginFill(0xA88B55);
    head.moveTo(4, -14);
    head.lineTo(0, -28);
    head.lineTo(12, -14);
    head.closePath();
    head.endFill();

function updateCoyoteAnimation(dt) {
    if (!coyote) return;
    animTime += dt;
    const c = coyote;

    // Walking
    if (walking) {
        c._legPhase += dt * 8;
        c._bobPhase += dt * 6;
        c._tailPhase += dt * 3;

        if (Math.floor(c._legPhase) % 6 === 0 && Math.random() < 0.1) playFootstep();
    } else {
        // Idle breathing
        c._bobPhase += dt * 1.5;
        c._tailPhase += dt * 1.5;
    }

    // Body bob
    c._body.y = Math.sin(c._bobPhase) * (walking ? 2.5 : 1);
    c._head.y = -8 + Math.sin(c._bobPhase) * (walking ? 2 : 0.5);

    // Legs
    const legPositions = [
        { x: -20, phase: 0 }, { x: -10, phase: Math.PI },
        { x: 10, phase: Math.PI * 0.5 }, { x: 20, phase: Math.PI * 1.5 }
    ];
    c._legs.forEach((leg, i) => {
        leg.clear();
        leg.beginFill(0xA88B55);
        const lp = legPositions[i];
        const swing = walking ? Math.sin(c._legPhase + lp.phase) * 8 : 0;
        leg.drawRoundedRect(lp.x - 3 + swing, 12, 7, 18, 2);
        // Paw
        leg.beginFill(0x8B7040);
        leg.drawEllipse(lp.x + swing, 30, 5, 3);
        leg.endFill();
    });

    // Tail
    c._tail.clear();
    const tailSwing = Math.sin(c._tailPhase) * 12;
    c._tail.beginFill(0xB89860);
    c._tail.drawEllipse(-35, -8 + tailSwing * 0.3, 18, 8);
    c._tail.endFill();
    c._tail.beginFill(0xF5F5DC);
    c._tail.drawEllipse(-40, -5 + tailSwing * 0.3, 8, 5);
    c._tail.endFill();

    // Eyes & blink
    c._blinkTimer -= dt;
    if (c._blinkTimer <= 0) {
        c._blinking = !c._blinking;
        c._blinkTimer = c._blinking ? 0.15 : 2 + Math.random() * 3;
    }

    c._eyeL.clear();
    c._eyeR.clear();
    const eyeBaseX = 38;
    const eyeBaseY = c._head.y + 1;
    if (c._blinking) {
        c._eyeL.beginFill(0x222222);
        c._eyeL.drawRect(eyeBaseX + 4, eyeBaseY - 4, 7, 2);
        c._eyeR.beginFill(0x222222);
        c._eyeR.drawRect(eyeBaseX + 12, eyeBaseY - 3, 7, 2);
    } else {
        // White
        c._eyeL.beginFill(0xFFFFFF);
        c._eyeL.drawCircle(eyeBaseX + 7, eyeBaseY - 3, 5);
        c._eyeL.endFill();
        c._eyeR.beginFill(0xFFFFFF);
        c._eyeR.drawCircle(eyeBaseX + 15, eyeBaseY - 2, 4);
        c._eyeR.endFill();
        // Pupils
        c._eyeL.beginFill(0x111111);
        c._eyeL.drawCircle(eyeBaseX + 9, eyeBaseY - 3, 2.5);
        c._eyeL.endFill();
        c._eyeR.beginFill(0x111111);
        c._eyeR.drawCircle(eyeBaseX + 17, eyeBaseY - 2, 2);
        c._eyeR.endFill();
    }

    // Howl
    if (c._howling) {
        c._head.rotation = -0.5;
        // Open mouth
        c._head.beginFill(0x333333);
        c._head.drawEllipse(20, -3, 6, 5);
        c._head.endFill();
    } else {
        c._head.rotation = 0;
    }
}

function addCompanionToParty() {
    if (companionCount > 10) return;

}

// ========== WORD SELECTION ==========
function pickWord() {
    const wordList = WORDS[grade];
    // Weighted by mastery - wrong words appear 3x more
    const weighted = [];
    wordList.forEach(w => {
        const m = mastery[w] || { correct: 0, wrong: 0, level: 0 };
        if (m.level >= 2) {
            weighted.push(w); // mastered = 1x weight
        } else if (m.wrong > 0) {
            weighted.push(w, w, w); // wrong = 3x weight
        } else {
            weighted.push(w, w); // default = 2x weight
        }
    });
    // Avoid repeating the same word
    let word;
    let attempts = 0;
    do {
        word = weighted[Math.floor(Math.random() * weighted.length)];
        attempts++;
    } while (word === currentWord && attempts < 20);
    return word;
}

// ========== UI ==========
function updateHUD() {
    document.getElementById('hud-score').textContent = 'Score: ' + score;
    document.getElementById('hud-streak').textContent = 'Streak: ' + streak;
    document.getElementById('hud-companions').textContent = 'Party: ' + (1 + companionCount);
}

function showFeedback(text, color) {
    const fb = document.getElementById('feedback');
    fb.textContent = text;
    fb.style.color = color || '#fff';
    fb.style.display = 'block';
    setTimeout(() => { fb.style.display = 'none'; }, 2000);
}

function setupAnswerSlots(word) {
    const row = document.getElementById('answer-row');
    row.innerHTML = '';
    for (let i = 0; i < word.length; i++) {
        const slot = document.createElement('div');
        slot.className = 'answer-slot';
        slot.dataset.index = i;
        row.appendChild(slot);
    }
}

function setupTiles(word) {
    const area = document.getElementById('tile-area');
    area.innerHTML = '';
    // Scramble letters
    const letters = word.split('');
    // Add a couple extra random letters for harder words
    if (word.length > 4) {
        const extras = 'abcdefghijklmnopqrstuvwxyz';
        for (let i = 0; i < 2; i++) {
            letters.push(extras[Math.floor(Math.random() * 26)]);
        }
    }
    // Shuffle
    for (let i = letters.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [letters[i], letters[j]] = [letters[j], letters[i]];
    }
    letters.forEach((ch, i) => {
        const tile = document.createElement('button');
        tile.className = 'letter-tile';
        tile.textContent = ch.toUpperCase();
        tile.dataset.letter = ch;
        tile.dataset.index = i;
        tile.addEventListener('click', () => onTileClick(tile));
        area.appendChild(tile);
    });
}

function onTileClick(tile) {
    if (tile.classList.contains('used') || correctLock) return;
    playTileClick();
    tile.classList.add('used');
    inputLetters.push(tile.dataset.letter);
    updateAnswerSlots();
    checkAnswer();
}

function updateAnswerSlots() {
    const slots = document.querySelectorAll('.answer-slot');
    slots.forEach((slot, i) => {
        if (i < inputLetters.length) {
            slot.textContent = inputLetters[i].toUpperCase();
            slot.classList.add('filled');
        } else {
            slot.textContent = '';
            slot.classList.remove('filled');
        }
    });
}

function checkAnswer() {
    if (inputLetters.length < currentWord.length) return;

    const attempt = inputLetters.join('').toLowerCase();
    if (attempt === currentWord) {
        onCorrectAnswer();
    } else {
        onWrongAnswer();
    }
}

// ========== INPUT HANDLING ==========
let typingHandler = null;

function attachTypingInput() {
    const input = document.getElementById('typing-input');
    input.value = '';
    input.style.opacity = '1';
    input.style.pointerEvents = 'auto';
    input.focus();

    typingHandler = (e) => {
        if (correctLock) return;
        const val = input.value.toLowerCase().replace(/[^a-z]/g, '');
        input.value = val;
        // Update answer slots from typing
        inputLetters = val.split('');
        updateAnswerSlots();
        // Also mark tiles as used
        markTilesFromInput(val);

        if (val.length >= currentWord.length) {
            if (val === currentWord) {
                onCorrectAnswer();
            } else if (val.length > currentWord.length) {
                // Too many letters, wrong
                onWrongAnswer();
            } else {
                onWrongAnswer();
            }
        }
    };
    input.addEventListener('input', typingHandler);
}

function detachTypingInput() {
    const input = document.getElementById('typing-input');
    if (typingHandler) input.removeEventListener('input', typingHandler);
    typingHandler = null;
    input.style.opacity = '0';
    input.style.pointerEvents = 'none';
    input.value = '';
}

function markTilesFromInput(val) {
    const tiles = document.querySelectorAll('.letter-tile');
    // Reset all
    tiles.forEach(t => t.classList.remove('used'));
    // Mark used for each letter typed
    const remaining = val.split('');
    tiles.forEach(t => {
        const idx = remaining.indexOf(t.dataset.letter);
        if (idx !== -1) {
            t.classList.add('used');
            remaining.splice(idx, 1);
        }
    });
}

// ========== CORRECT/WRONG ==========
function onCorrectAnswer() {
    if (correctLock) return;
    correctLock = true;
    detachTypingInput();
    const myGen = encounterGen;

    // Mark slots correct
    document.querySelectorAll('.answer-slot').forEach(s => s.classList.add('correct'));

    score += 10 + streak * 2;
    streak++;
    totalCorrect++;

    // Mastery
    if (!mastery[currentWord]) mastery[currentWord] = { correct: 0, wrong: 0, level: 0 };
    mastery[currentWord].correct++;
    if (mastery[currentWord].correct >= 2) mastery[currentWord].level = 2;

    // Companion check
    if (totalCorrect % 5 === 0 && companionCount < COMPANION_NAMES.length) {
        companionCount++;
        setTimeout(() => addCompanionToParty(), 800);
    }

    updateHUD();
    saveData();

    playCorrect();
    showFeedback('Correct!', '#4CAF50');

    // Howl animation
    coyote._howling = true;
    playHowl();

    // Resume after howl
    setTimeout(() => {
        if (encounterGen !== myGen) return;
        coyote._howling = false;
        drawCoyoteParts(coyote);
        clearEncounterVisual();
        hideEncounterUI();
        inEncounter = false;
        correctLock = false;
        walking = true;
        if (correctFallbackTimer) { clearTimeout(correctFallbackTimer); correctFallbackTimer = null; }
        // Check theme change
        if (totalCorrect % 10 === 0) {
            buildEnvironment();
            showFeedback(getTheme().name + '!', '#FFD700');
        }
    }, 1500);

    // Hard fallback
    correctFallbackTimer = setTimeout(() => {
        correctFallbackTimer = null;
        if (encounterGen !== myGen) return;
        if (!walking && correctLock) {
            coyote._howling = false;
            drawCoyoteParts(coyote);
            clearEncounterVisual();
            hideEncounterUI();
            inEncounter = false;
            correctLock = false;
            walking = true;
        }
    }, 2000);
}

function onWrongAnswer() {
    if (correctLock) return;
    correctLock = true;
    detachTypingInput();
    const myGen = encounterGen;

    streak = 0;

    // Mastery
    if (!mastery[currentWord]) mastery[currentWord] = { correct: 0, wrong: 0, level: 0 };
    mastery[currentWord].wrong++;

    updateHUD();
    playWrong();
    showFeedback('Not quite...', '#f44336');

    // Mark slots wrong
    document.querySelectorAll('.answer-slot').forEach(s => s.classList.add('wrong'));

    // Reveal correct spelling letter by letter
    const slots = document.querySelectorAll('.answer-slot');
    const letters = currentWord.split('');
    let revealIndex = 0;

    if (wrongRevealInterval) clearInterval(wrongRevealInterval);
    wrongRevealInterval = setInterval(() => {
        if (encounterGen !== myGen) { clearInterval(wrongRevealInterval); wrongRevealInterval = null; return; }
        if (revealIndex < letters.length) {
            slots[revealIndex].textContent = letters[revealIndex].toUpperCase();
            slots[revealIndex].classList.remove('wrong');
            slots[revealIndex].classList.add('correct');
            slots[revealIndex].classList.add('filled');
            revealIndex++;
        } else {
            clearInterval(wrongRevealInterval);
            wrongRevealInterval = null;
            // Wait then proceed
            setTimeout(() => {
                if (encounterGen !== myGen) return;
                clearEncounterVisual();
                hideEncounterUI();
                inEncounter = false;
                correctLock = false;
                walking = true;
                if (wrongFallbackTimer) { clearTimeout(wrongFallbackTimer); wrongFallbackTimer = null; }
            }, 1500);
        }
    }, 300);

    // Hard fallback - 8 second max
    if (wrongFallbackTimer) clearTimeout(wrongFallbackTimer);
    wrongFallbackTimer = setTimeout(() => {
        wrongFallbackTimer = null;
        if (encounterGen !== myGen) return;
        if (wrongRevealInterval) { clearInterval(wrongRevealInterval); wrongRevealInterval = null; }
        if (!walking) {
            clearEncounterVisual();
            hideEncounterUI();
            inEncounter = false;
            correctLock = false;
            walking = true;
        }
    }, 8000);
}

// ========== ENCOUNTER FLOW ==========
function showEncounterUI() {
    document.getElementById('answer-row').style.display = 'flex';
    document.getElementById('tile-area').style.display = 'flex';

}

function hideEncounterUI() {
    document.getElementById('word-display').style.display = 'none';
    document.getElementById('word-picture').style.display = 'none';
    document.getElementById('answer-row').style.display = 'none';
    document.getElementById('tile-area').style.display = 'flex';
    document.getElementById('tile-area').innerHTML = '';
    document.getElementById('answer-row').innerHTML = '';

}

let encounterDistance = 300 + Math.random() * 200;
let distanceSinceEncounter = 0;

function triggerEncounter() {
    encounterGen++;
    // Clear any stale timers from previous encounters
    if (wrongFallbackTimer) { clearTimeout(wrongFallbackTimer); wrongFallbackTimer = null; }
    if (wrongRevealInterval) { clearInterval(wrongRevealInterval); wrongRevealInterval = null; }
    if (correctFallbackTimer) { clearTimeout(correctFallbackTimer); correctFallbackTimer = null; }
    inEncounter = true;
    walking = false;
    correctLock = false;
    inputLetters = [];

    currentWord = pickWord();
    currentEncounter = ENCOUNTER_TYPES[Math.floor(Math.random() * ENCOUNTER_TYPES.length)];

    createEncounterVisual(currentEncounter);

    // Speak word
    speakWord(currentWord);

    // Show picture cue
    const pic = document.getElementById('word-picture');
    const emoji = WORD_PICTURES[currentWord];
    if (emoji) {
        pic.textContent = emoji;
        pic.style.display = 'block';
    } else {
        pic.style.display = 'none';
    }

    // Flash word for 2 seconds
    const wd = document.getElementById('word-display');
    wd.textContent = currentWord.toUpperCase();
    wd.style.display = 'block';

    setTimeout(() => {
        wd.style.display = 'none';
        // Show UI
        setupAnswerSlots(currentWord);
        setupTiles(currentWord);
        showEncounterUI();
        attachTypingInput();
    }, 2000);

    encounterDistance = 300 + Math.random() * 300;
    distanceSinceEncounter = 0;
}

// Speaker button
document.getElementById('word-picture').addEventListener('click', () => {
    if (inEncounter && currentWord) speakWord(currentWord);
});

// ========== PARALLAX SCROLLING ==========
function updateParallax(dx) {
    worldOffset += dx;

    // Move midground objects (cacti)
    parallax.mid.children.forEach(c => {
        if (c._baseX !== undefined) {
            c.x = c._baseX - worldOffset * 0.5;
            // Wrap around
            if (c.x < -60) c._baseX += W() * 2;
            if (c.x > W() + 60) c._baseX -= W() * 2;
        }
    });

    // Move background mountains slower
    parallax.bg.children.forEach(c => {
        if (c._baseX !== undefined) {
            c.x = c._baseX - worldOffset * 0.15;
            if (c.x < -200) c._baseX += W() * 2;
            if (c.x > W() + 200) c._baseX -= W() * 2;
        }
    });

    // Move encounter objects
    encounterContainer.children.forEach(c => {
        c.x = -worldOffset;
    });
}

// ========== GAME LOOP ==========
function gameLoop(delta) {
    const dt = delta / 60;

    updateCoyoteAnimation(dt);

    // Update companion positions
    companionSprites.forEach((comp, i) => {
        const targetX = coyoteScreenX - (i + 1) * 50;
        comp.x += (targetX - comp.x) * 0.05;
        comp.y = groundY() - 5 + Math.sin(animTime * 2 + i) * 2;
        comp._phase += dt * 2;
    });

    if (walking) {
        const speed = 1.5;
        updateParallax(speed);
        distanceSinceEncounter += speed;

        // Check for encounter
        if (distanceSinceEncounter >= encounterDistance) {
            triggerEncounter();
        }
    }

    // Campfire flicker
    if (currentEncounter === 'campfire' && inEncounter) {
        encounterContainer.children.forEach(c => {
            c.alpha = 0.9 + Math.sin(animTime * 10) * 0.1;
        });
    }
}

// ========== START SCREEN ==========
function startGame() {
    playerName = document.getElementById('player-name').value.trim() || 'Trailblazer';
    grade = parseInt(document.getElementById('grade-select').value);

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';

    // Rebuild companions from save
    for (let i = 0; i < companionCount; i++) {
        const comp = createCompanion(i);
        comp.y = groundY() - 5;
        comp.x = coyoteScreenX - (i + 1) * 50;
        companionSprites.push(comp);
        app.stage.addChild(comp);
    }

    updateHUD();
    saveData();
    walking = true;
    getAudio(); // Init audio context on user gesture
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('player-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') startGame();
});

// ========== INIT ==========
loadData();
initPixi();
</script>
